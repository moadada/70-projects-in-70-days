<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <style>
    :root {
      --bg-1: #09111f;
      --bg-2: #151b2e;
      --bg-3: #203047;
      --panel: rgba(12, 18, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.16);
      --muted: #9eacc4;
      --text: #eef4ff;
      --field: rgba(255, 255, 255, 0.08);
      --field-border: rgba(255, 255, 255, 0.18);
      --accent: #41d1b9;
      --accent-2: #7aa7ff;
      --danger: #ff6464;
      --warning: #ffbd5f;
      --success: #36d399;
      --strong: #42a5ff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg-1);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(135deg, rgba(65, 209, 185, 0.2), transparent 32%),
        linear-gradient(315deg, rgba(122, 167, 255, 0.24), transparent 34%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.07), transparent 34%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 47%, var(--bg-3));
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(760px, 100%);
    }

    .shell {
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.5;
    }

    main {
      padding: 24px 28px 28px;
    }

    .section {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section:first-child {
      padding-top: 0;
    }

    .section:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .password-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: stretch;
      position: relative;
    }

    .password-field {
      width: 100%;
      min-width: 0;
      height: 54px;
      padding: 0 15px;
      color: var(--text);
      background: var(--field);
      border: 1px solid var(--field-border);
      border-radius: var(--radius);
      outline: none;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: clamp(0.9rem, 2.4vw, 1.15rem);
      letter-spacing: 0.04em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-button,
    .primary-button {
      min-height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .icon-button {
      width: 54px;
      display: inline-grid;
      place-items: center;
      padding: 0;
    }

    .primary-button {
      padding: 0 18px;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(65, 209, 185, 0.95), rgba(122, 167, 255, 0.95));
      color: #07111f;
      border-color: rgba(255, 255, 255, 0.26);
      white-space: nowrap;
    }

    .icon-button:hover,
    .primary-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.36);
    }

    .icon-button:focus-visible,
    .primary-button:focus-visible,
    input:focus-visible {
      outline: 2px solid rgba(65, 209, 185, 0.9);
      outline-offset: 3px;
    }

    .icon {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .notice {
      min-height: 24px;
      margin-top: 10px;
      color: var(--warning);
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .notice.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 16px);
      padding: 11px 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(10, 16, 28, 0.9);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.34);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .strength-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .strength-meter {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .strength-fill {
      height: 100%;
      width: 25%;
      background: var(--danger);
      transition: width 180ms ease, background 180ms ease;
    }

    .strength-label {
      min-width: 96px;
      text-align: right;
      font-size: 0.94rem;
      font-weight: 800;
    }

    .length-control {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    input[type="number"] {
      width: 78px;
      height: 44px;
      padding: 0 10px;
      text-align: center;
      color: var(--text);
      background: var(--field);
      border: 1px solid var(--field-border);
      border-radius: var(--radius);
      outline: none;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
    }

    .option input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .option span {
      min-width: 0;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    @media (max-width: 620px) {
      body {
        padding: 18px 12px;
        align-items: start;
      }

      header,
      main {
        padding-left: 18px;
        padding-right: 18px;
      }

      .password-row {
        grid-template-columns: 1fr 54px;
      }

      .password-field {
        grid-column: 1 / -1;
      }

      .primary-button {
        width: 100%;
      }

      .options {
        grid-template-columns: 1fr;
      }

      .section-title,
      .strength-grid,
      .length-control {
        grid-template-columns: 1fr;
      }

      .section-title {
        align-items: start;
      }

      .strength-label {
        min-width: 0;
        text-align: left;
      }

      .actions {
        justify-content: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header>
        <h1>Password Generator</h1>
        <p class="subtitle">Create client-side passwords with secure randomness, adjustable character sets, and real-time strength feedback.</p>
      </header>

      <main>
        <section class="section" aria-labelledby="password-heading">
          <div class="section-title">
            <h2 id="password-heading">Generated Password</h2>
          </div>

          <div class="password-row">
            <input id="password" class="password-field" type="text" readonly aria-label="Generated password" />

            <button id="toggleVisibility" class="icon-button" type="button" aria-label="Hide password" title="Show or hide password">
              <svg id="eyeOpen" class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeClosed" class="icon" viewBox="0 0 24 24" aria-hidden="true" hidden>
                <path d="m3 3 18 18"></path>
                <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-1.2"></path>
                <path d="M9.9 5.2A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a17.8 17.8 0 0 1-2.3 3.2"></path>
                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.1-.8"></path>
              </svg>
            </button>

            <button id="copyPassword" class="icon-button" type="button" aria-label="Copy password" title="Copy password">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>

          <div id="notice" class="notice" role="status" aria-live="polite"></div>
        </section>

        <section class="section" aria-labelledby="strength-heading">
          <div class="section-title">
            <h2 id="strength-heading">Strength</h2>
          </div>

          <div class="strength-grid">
            <div class="strength-meter" aria-hidden="true">
              <div id="strengthFill" class="strength-fill"></div>
            </div>
            <div id="strengthLabel" class="strength-label" aria-live="polite">Weak</div>
          </div>
        </section>

        <section class="section" aria-labelledby="settings-heading">
          <div class="section-title">
            <h2 id="settings-heading">Settings</h2>
            <span id="lengthValue" aria-live="polite">16 characters</span>
          </div>

          <div class="length-control">
            <input id="lengthRange" type="range" min="8" max="32" value="16" aria-label="Password length" />
            <input id="lengthNumber" type="number" min="8" max="32" value="16" aria-label="Password length number" />
          </div>

          <div class="options">
            <label class="option">
              <input class="charset-option" type="checkbox" data-set="uppercase" checked />
              <span>Uppercase A-Z</span>
            </label>
            <label class="option">
              <input class="charset-option" type="checkbox" data-set="lowercase" checked />
              <span>Lowercase a-z</span>
            </label>
            <label class="option">
              <input class="charset-option" type="checkbox" data-set="numbers" checked />
              <span>Numbers 0-9</span>
            </label>
            <label class="option">
              <input class="charset-option" type="checkbox" data-set="special" checked />
              <span>Special characters</span>
            </label>
          </div>
        </section>

        <section class="section">
          <div class="actions">
            <button id="generatePassword" class="primary-button" type="button">Generate New</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const characterSets = {
      uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      lowercase: "abcdefghijklmnopqrstuvwxyz",
      numbers: "0123456789",
      special: "!@#$%^&*()_+-=[]{}|;:,.<>?"
    };

    const passwordInput = document.getElementById("password");
    const lengthRange = document.getElementById("lengthRange");
    const lengthNumber = document.getElementById("lengthNumber");
    const lengthValue = document.getElementById("lengthValue");
    const options = Array.from(document.querySelectorAll(".charset-option"));
    const strengthFill = document.getElementById("strengthFill");
    const strengthLabel = document.getElementById("strengthLabel");
    const notice = document.getElementById("notice");
    const toast = document.getElementById("toast");
    const toggleVisibilityButton = document.getElementById("toggleVisibility");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    let toastTimer;
    let noticeTimer;

    function secureRandomInt(max) {
      if (max <= 0) {
        throw new Error("Random upper bound must be positive.");
      }

      // Rejection sampling avoids modulo bias when mapping crypto values into a range.
      const array = new Uint32Array(1);
      const limit = Math.floor(0x100000000 / max) * max;

      do {
        crypto.getRandomValues(array);
      } while (array[0] >= limit);

      return array[0] % max;
    }

    function getRandomCharacter(chars) {
      return chars[secureRandomInt(chars.length)];
    }

    function shuffleSecure(items) {
      const shuffled = [...items];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = secureRandomInt(index + 1);
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }

      return shuffled;
    }

    function clampLength(value) {
      const parsed = Number.parseInt(value, 10);

      if (Number.isNaN(parsed)) {
        return 16;
      }

      return Math.min(32, Math.max(8, parsed));
    }

    function showNotice(message) {
      clearTimeout(noticeTimer);
      notice.textContent = message;
      notice.classList.add("is-visible");

      noticeTimer = setTimeout(() => {
        notice.classList.remove("is-visible");
      }, 1800);
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("is-visible");

      toastTimer = setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 1500);
    }

    function selectedSetKeys() {
      const selected = options
        .filter((option) => option.checked)
        .map((option) => option.dataset.set);

      if (selected.length > 0) {
        return selected;
      }

      // If everything is deselected, restore all sets so generation never fails silently.
      options.forEach((option) => {
        option.checked = true;
      });
      showNotice("All character types were re-selected so a password can be generated.");

      return options.map((option) => option.dataset.set);
    }

    function generatePassword() {
      const length = clampLength(lengthNumber.value);
      lengthRange.value = String(length);
      lengthNumber.value = String(length);
      lengthValue.textContent = `${length} character${length === 1 ? "" : "s"}`;

      const selected = selectedSetKeys();
      const selectedSets = selected.map((key) => characterSets[key]);
      const combinedCharacters = selectedSets.join("");

      // First place one character from every selected set, then fill the rest.
      // This guarantees selected categories are represented in the final password.
      const requiredCharacters = selectedSets.map(getRandomCharacter);
      const remainingLength = length - requiredCharacters.length;
      const remainingCharacters = Array.from({ length: remainingLength }, () => {
        return getRandomCharacter(combinedCharacters);
      });

      const password = shuffleSecure([...requiredCharacters, ...remainingCharacters]).join("");

      passwordInput.value = password;
      updateStrength(password, selected);
    }

    function updateStrength(password, selectedSets) {
      const length = password.length;
      const variety = selectedSets.length;
      const hasNumber = selectedSets.includes("numbers");
      const hasSpecial = selectedSets.includes("special");

      /*
        Custom strength scoring:
        - Longer passwords earn more points, but sub-12-character passwords are capped.
        - More character variety increases the score.
        - Numbers and special characters add extra entropy and receive small bonuses.
      */
      let score = 0;

      if (length >= 12) score += 1;
      if (length >= 16) score += 1;
      if (length >= 24) score += 1;

      score += Math.max(0, variety - 1);

      if (hasNumber) score += 1;
      if (hasSpecial) score += 1;

      if (length < 12) {
        score = Math.min(score, 2);
      }

      const levels = [
        { max: 2, label: "Weak", width: "25%", color: "var(--danger)" },
        { max: 4, label: "Medium", width: "50%", color: "var(--warning)" },
        { max: 6, label: "Strong", width: "75%", color: "var(--strong)" },
        { max: Infinity, label: "Very Strong", width: "100%", color: "var(--success)" }
      ];

      const level = levels.find((item) => score <= item.max);

      strengthLabel.textContent = level.label;
      strengthLabel.style.color = level.color;
      strengthFill.style.width = level.width;
      strengthFill.style.background = level.color;
    }

    async function copyPassword() {
      const password = passwordInput.value;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(password);
        } else {
          // Fallback for file:// or browsers that block the async Clipboard API.
          passwordInput.focus();
          passwordInput.select();

          const copied = document.execCommand("copy");
          passwordInput.setSelectionRange(0, 0);

          if (!copied) {
            throw new Error("Fallback copy command failed.");
          }
        }

        showToast("Copied!");
      } catch (error) {
        showToast("Copy failed. Select the password and copy manually.");
      }
    }

    function syncLengthFromRange() {
      lengthNumber.value = lengthRange.value;
      generatePassword();
    }

    function syncLengthFromNumber() {
      const length = clampLength(lengthNumber.value);
      lengthNumber.value = String(length);
      lengthRange.value = String(length);
      generatePassword();
    }

    document.getElementById("generatePassword").addEventListener("click", generatePassword);
    document.getElementById("copyPassword").addEventListener("click", copyPassword);
    lengthRange.addEventListener("input", syncLengthFromRange);
    lengthNumber.addEventListener("input", syncLengthFromNumber);

    options.forEach((option) => {
      option.addEventListener("change", generatePassword);
    });

    toggleVisibilityButton.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";

      passwordInput.type = isHidden ? "text" : "password";
      toggleVisibilityButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      eyeOpen.hidden = !isHidden;
      eyeClosed.hidden = isHidden;
    });

    generatePassword();
  </script>
</body>
</html>
