<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Dashboard | Crypto & Fiat Charts</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts@5.0.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="card">
            <h1>📊 Pro Market Dashboard</h1>
            <p class="subtitle">Real‑time prices + historical charts</p>

            <div class="asset-type">
                <button id="btnCrypto" class="active">₿ Crypto</button>
                <button id="btnFiat">💱 Fiat</button>
            </div>

            <div class="selector-row">
                <div class="input-group">
                    <label>Asset / Currency</label>
                    <select id="assetSelect"></select>
                </div>
                <div class="input-group">
                    <label>vs</label>
                    <select id="vsSelect"></select>
                </div>
            </div>

            <div class="timeframe">
                <button data-days="1">1D</button>
                <button data-days="7" class="active">1W</button>
                <button data-days="30">1M</button>
                <button data-days="365">1Y</button>
                <button data-days="max">MAX</button>
            </div>

            <div class="price-panel">
                <div class="current-price" id="currentPrice">--</div>
                <div class="change-percent" id="changePercent">--</div>
            </div>

            <div id="chartContainer" style="width:100%; height:400px; margin:20px 0;"></div>

            <div id="loadingMsg" class="loading-msg">Loading chart data...</div>
            <div id="errorMsg" class="error-msg"></div>

            <div class="footer">
                <span>Data via FCS API & CoinGecko</span>
                <span>Charts by TradingView</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
