<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2rem;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #taskInput {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            border-color: #667eea;
        }

        #addBtn {
            padding: 15px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        #addBtn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        #taskList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .task-item:hover {
            transform: translateX(5px);
        }

        .task-check {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #4cd964;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            color: #333;
            word-break: break-word;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }

        .delete-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .delete-btn:hover {
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
            color: #666;
            font-size: 0.9rem;
        }

        #clearAllBtn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 To-Do List</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button id="addBtn">+ Add</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList">
            <li class="empty-message">✨ No tasks yet. Add one above!</li>
        </ul>

        <div class="stats">
            <span id="taskCount">0 tasks</span>
            <button id="clearAllBtn">Clear All</button>
        </div>
    </div>

    <script>
        // Load tasks from localStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        // DOM elements
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const taskCountSpan = document.getElementById('taskCount');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Save tasks to localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Render tasks based on current filter
        function renderTasks() {
            let filteredTasks = tasks;
            
            if (currentFilter === 'active') {
                filteredTasks = tasks.filter(task => !task.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(task => task.completed);
            }

            if (filteredTasks.length === 0) {
                let message = '';
                if (currentFilter === 'all') message = '✨ No tasks yet. Add one above!';
                else if (currentFilter === 'active') message = '✅ No active tasks!';
                else message = '🎉 No completed tasks!';
                
                taskList.innerHTML = `<li class="empty-message">${message}</li>`;
                taskCountSpan.innerText = `${tasks.filter(t => !t.completed).length} remaining`;
                return;
            }

            taskList.innerHTML = filteredTasks.map(task => `
                <li class="task-item" data-id="${task.id}">
                    <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''}>
                    <span class="task-text ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</span>
                    <button class="delete-btn">Delete</button>
                </li>
            `).join('');

            // Update task count
            const remainingCount = tasks.filter(t => !t.completed).length;
            taskCountSpan.innerText = `${remainingCount} remaining`;

            // Add event listeners to new elements
            document.querySelectorAll('.task-check').forEach((checkbox, index) => {
                const taskId = parseInt(checkbox.closest('.task-item').dataset.id);
                checkbox.addEventListener('change', () => toggleTask(taskId));
            });

            document.querySelectorAll('.delete-btn').forEach((btn, index) => {
                const taskId = parseInt(btn.closest('.task-item').dataset.id);
                btn.addEventListener('click', () => deleteTask(taskId));
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add new task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') {
                alert('Please enter a task!');
                return;
            }

            const newTask = {
                id: Date.now(),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.push(newTask);
            saveTasks();
            renderTasks();
            taskInput.value = '';
            taskInput.focus();
        }

        // Toggle task completion
        function toggleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        // Delete a single task
        function deleteTask(taskId) {
            tasks = tasks.filter(t => t.id !== taskId);
            saveTasks();
            renderTasks();
        }

        // Clear all completed tasks
        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
        }

        // Clear all tasks
        function clearAllTasks() {
            if (tasks.length > 0 && confirm('⚠️ Delete ALL tasks? This cannot be undone.')) {
                tasks = [];
                saveTasks();
                renderTasks();
            }
        }

        // Change filter
        function setFilter(filter) {
            currentFilter = filter;
            
            // Update active button style
            filterBtns.forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            renderTasks();
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
        clearAllBtn.addEventListener('click', clearAllTasks);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
